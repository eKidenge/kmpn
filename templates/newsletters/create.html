{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Create Newsletter - Admin - KMPN{% endblock %}

{% block content %}
<section class="section-padding">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <div class="card-government">
                    <div class="card-header">
                        <h4 class="mb-0"><i class="fas fa-plus-circle text-gold me-2"></i> Create Newsletter</h4>
                    </div>
                    <div class="card-body">
                        <form method="post">
                            {% csrf_token %}
                            {{ form|crispy }}
                            
                            <div class="row mt-4">
                                <div class="col-12">
                                    <div class="alert alert-government alert-info">
                                        <i class="fas fa-info-circle me-2"></i>
                                        <strong>Tip:</strong> Use the preview feature to test your newsletter before sending.
                                    </div>
                                </div>
                            </div>
                            
                            <div class="d-flex gap-2 mt-4">
                                <button type="submit" class="btn-gold">
                                    <i class="fas fa-save me-2"></i> Save Draft
                                </button>
                                <button type="submit" name="preview" class="btn-navy">
                                    <i class="fas fa-eye me-2"></i> Preview
                                </button>
                                <a href="{% url 'newsletters:list' %}" class="btn btn-secondary">
                                    <i class="fas fa-times me-2"></i> Cancel
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
